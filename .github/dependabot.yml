version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Kotlin is upgraded deliberately, not on the automated cadence: KSP is
    # version-locked to the exact Kotlin release, and the Android modules' Kotlin
    # comes from AGP's built-in compiler rather than this catalog ref, so a lone
    # catalog bump only moves the JVM modules and skews the published artifacts.
    # The trailing "." / ":" keep org.jetbrains.kotlinx (coroutines) in scope.
    ignore:
      - dependency-name: "org.jetbrains.kotlin:*"
      - dependency-name: "org.jetbrains.kotlin.*"
    groups:
      gradle-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    # "/" covers .github/workflows; composite actions need their directory
    # listed explicitly or Dependabot never sees them.
    directories:
      - "/"
      - "/.github/actions/setup"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/lustro-cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
