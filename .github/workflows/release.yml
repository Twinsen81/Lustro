name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # --- Signed Central release + GitHub Release with artifacts -----------------
  publish:
    name: Publish release to Central + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK + Gradle
        uses: ./.github/actions/setup

      # Sanity: the tag (vX.Y.Z) must match the project's VERSION_NAME (X.Y.Z),
      # and a release tag must NOT be a -SNAPSHOT.
      - name: Resolve and verify version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(./gradlew -q :lustro:properties --console=plain \
            | awk -F': ' '/^version:/ {print $2; exit}')"
          echo "Tag version: $TAG / project version: $PROJECT_VERSION"
          if [[ "$PROJECT_VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Refusing to release a -SNAPSHOT version ($PROJECT_VERSION)."
            exit 1
          fi
          if [[ "$TAG" != "$PROJECT_VERSION" ]]; then
            echo "::error::Tag ($TAG) does not match project version ($PROJECT_VERSION)."
            exit 1
          fi
          echo "version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      # Signed staging + automatic release on the Central Portal. This is the
      # release counterpart of snapshot.yml's publishToMavenCentral.
      - name: Publish + release to Central (signed)
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --console=plain --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}

      # Assemble the artifacts to attach to the GitHub Release: the two AARs, the
      # wire-schema jar, and the CLI wheel/sdist.
      - name: Assemble release artifacts
        run: |
          ./gradlew \
            :lustro:assembleRelease \
            :lustro-noop:assembleRelease \
            :lustro-wire-schema:jar \
            --console=plain --stacktrace

      - name: Build CLI distributions
        run: |
          python -m pip install --upgrade build
          python -m build lustro-cli --outdir dist-cli

      - name: Collect release files
        # Fail the job if any REQUIRED artifact is missing: shipping a partial
        # GitHub Release (e.g. an AAR or the wheel silently absent) is worse than
        # failing the release. `set -euo pipefail` makes a failed `cp` abort.
        run: |
          set -euo pipefail
          mkdir -p release-files
          # Required: both AARs. A missing file aborts the step (no `|| true`).
          cp lustro/build/outputs/aar/lustro-release.aar release-files/
          cp lustro-noop/build/outputs/aar/lustro-noop-release.aar release-files/
          # Required: the main wire-schema jar. `*.jar` would also pick up the
          # -sources and -javadoc jars Vanniktech produces; exclude those so the
          # Release carries a single wire-schema artifact (the consumable jar). The
          # exclusion stays tolerant of those variants, but the MAIN jar is
          # mandatory — fail loudly if the glob matches nothing.
          mapfile -t wire_jars < <(find lustro-wire-schema/build/libs -maxdepth 1 -name '*.jar' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar')
          if [[ ${#wire_jars[@]} -eq 0 ]]; then
            echo "::error::No wire-schema jar found in lustro-wire-schema/build/libs (expected the main consumable jar)."
            exit 1
          fi
          cp "${wire_jars[@]}" release-files/
          # Required: the CLI distributions (wheel + sdist from `python -m build`).
          cp dist-cli/* release-files/
          ls -l release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: release-files/*

  # --- Dokka API docs to gh-pages --------------------------------------------
  docs:
    name: Deploy Dokka to gh-pages
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write # push to the gh-pages branch
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK + Gradle
        uses: ./.github/actions/setup

      # Aggregated multi-module HTML docs for the published modules.
      - name: Generate Dokka HTML
        run: ./gradlew dokkaGenerate --console=plain --stacktrace

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/dokka/html
          destination_dir: ${{ needs.publish.outputs.version }}

  # --- PyPI publish of the CLI ------------------------------------------------
  pypi:
    name: Publish lustro-cli to PyPI
    runs-on: ubuntu-latest
    needs: publish
    # Trusted publishing (OIDC) needs id-token: write; the environment gate lets
    # PyPI scope the trusted publisher to this workflow/environment.
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build CLI distributions
        run: |
          python -m pip install --upgrade build
          python -m build lustro-cli --outdir dist

      # Trusted publishing: no API token in secrets. If you prefer a token,
      # set `password: ${{ secrets.PYPI_API_TOKEN }}` instead and drop id-token.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
