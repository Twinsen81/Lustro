name: Publish snapshot

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-snapshot:
    name: Publish -SNAPSHOT to Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK + Gradle
        uses: ./.github/actions/setup

      # Guard: only publish when VERSION_NAME ends with -SNAPSHOT. A non-SNAPSHOT
      # version on main means a release is in flight (release.yml owns that), so
      # this job no-ops to avoid clobbering a staged release.
      - name: Resolve version and gate
        id: gate
        run: |
          VERSION="$(./gradlew -q :lustro:properties --console=plain \
            | awk -F': ' '/^version:/ {print $2; exit}')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is a snapshot — will publish."
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is NOT a snapshot — skipping snapshot publish."
          fi

      # Publishes the three library artifacts + :lustro-wire-schema to the Central
      # Portal snapshot repository. Snapshots do not require the staging-release
      # step, so `publishToMavenCentral` (not publishAndRelease...) is correct.
      # Signing is opt-in: it activates because the in-memory signing key env vars
      # below are present (see each module's mavenPublishing { } gate).
      - name: Publish snapshot
        if: ${{ steps.gate.outputs.publish == 'true' }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache --console=plain --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
